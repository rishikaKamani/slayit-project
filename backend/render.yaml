services:
  - type: web
    name: slayit-backend
    runtime: java
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/slayit-backend-1.0.0.jar
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: APP_JWT_SECRET
        sync: false
